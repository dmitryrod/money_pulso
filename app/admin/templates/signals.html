{% extends "layout.html" %}
{% block title %}<title>Сигналы</title>{% endblock %}
{% block content %}{{ super() }}

<style>
  /* ── Скрываем стандартный заголовок страницы ── */
  .page-title { display: none; }
  .page-header { display: none !important; }

  /* Tabler: белый зазор = margin-top у .page-body; серая линия под шапкой = inset box-shadow у .navbar */
  .page > header.navbar:not(.navbar-vertical) {
    box-shadow: none !important;
    border-bottom: none !important;
  }
  .page-wrapper > .page-body {
    margin-top: 0 !important;
  }

  /* ── Основной контейнер ── */
  .signals-page {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 8px 16px 80px;
    max-width: 100%;
  }

  /* ── Шапка: переключатель источника + статус + пагинация ── */
  .signals-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    background: var(--mp-c-surface, #1a1f2e);
    border-radius: 10px;
    padding: 10px 14px;
  }

  .signals-toolbar .toolbar-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--mp-c-text, #e0e6f0);
    margin-right: 4px;
  }

  /* Переключатель источника */
  .source-switcher {
    display: flex;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid var(--mp-c-border, #2d3550);
  }
  .source-switcher button {
    background: var(--mp-c-raised, #232a3e);
    color: var(--mp-c-text-muted, #8899bb);
    border: none;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .source-switcher button.active {
    background: var(--mp-signal-tab-active, #3a5bbf);
    color: #fff;
    font-weight: 600;
  }
  .source-switcher button:hover:not(.active) {
    background: var(--mp-signal-pill-ok, #2d3a5e);
    color: var(--mp-c-text-soft, #c0ccdd);
  }

  .btn-purge-signals {
    background: var(--mp-signal-pill-err, #3a2626);
    color: var(--mp-purge-fg, #f0d0d0);
    border: 1px solid var(--mp-signal-pill-err, #664040);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-purge-signals:hover:not(:disabled) { background: var(--mp-purge-hover, #4a3030); }
  .btn-purge-signals:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Индикатор соединения */
  .sse-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--mp-c-text-muted, #8899bb);
    margin-left: auto;
  }
  .sse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--mp-sound-on, #4caf50);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .sse-dot.disconnected { background: var(--mp-sound-off, #f44336); }
  .sse-dot.connecting   { background: var(--mp-sound-warn, #ff9800); }

  /* Выбор количества на странице */
  .per-page-select {
    background: var(--mp-c-raised, #232a3e);
    color: var(--mp-c-text-soft, #c0ccdd);
    border: 1px solid var(--mp-c-border, #2d3550);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .per-page-select:focus { outline: none; border-color: var(--mp-signal-tab-active, #3a5bbf); }

  /* ── Переключатель звука ── */
  .sound-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .sound-label {
    font-size: 13px;
    color: var(--mp-c-text-muted, #8899bb);
    user-select: none;
  }
  .sound-switch {
    position: relative;
    width: 36px;
    height: 20px;
    display: inline-block;
    flex-shrink: 0;
  }
  .sound-switch input { display: none; }
  .sound-slider {
    position: absolute;
    inset: 0;
    background: var(--mp-c-border, #2d3550);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .sound-slider::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .sound-switch input:checked + .sound-slider { background: var(--mp-signal-tab-active, #3a5bbf); }
  .sound-switch input:checked + .sound-slider::before { transform: translateX(16px); }

  /* Пагинация */
  .pagination-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .pagination-bar button {
    background: var(--mp-c-raised, #232a3e);
    color: var(--mp-c-text-muted, #8899bb);
    border: 1px solid var(--mp-c-border, #2d3550);
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 13px;
    cursor: pointer;
    min-width: 32px;
    transition: background 0.15s;
  }
  .pagination-bar button.active {
    background: var(--mp-signal-tab-active, #3a5bbf);
    color: #fff;
    border-color: var(--mp-signal-tab-active, #3a5bbf);
  }
  .pagination-bar button:hover:not(.active):not(:disabled) {
    background: var(--mp-signal-pill-ok, #2d3a5e);
    color: var(--mp-c-text-soft, #c0ccdd);
  }
  .pagination-bar button:active:not(.active):not(:disabled) {
    background: var(--mp-signal-row-alt, #243050);
    color: var(--mp-c-text, #d8e2f0);
  }
  .pagination-bar button:focus-visible {
    outline: 2px solid var(--mp-c-link, #5b9cf6);
    outline-offset: 2px;
  }
  .pagination-bar button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .pagination-info {
    font-size: 12px;
    color: var(--mp-c-hint, #6677aa);
    white-space: nowrap;
  }

  /* Новые сигналы: живой счётчик */
  .new-badge {
    background: var(--mp-signal-tab-active, #3a5bbf);
    color: #fff;
    border-radius: 12px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 600;
    display: none;
  }
  .new-badge.visible { display: inline-block; }

  /* ── Лента карточек ── */
  .signals-feed {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
  }
  .signals-feed .signal-card--test {
    align-self: stretch;
    width: 100%;
    max-width: 100%;
    min-width: 0;
  }

  .signals-empty {
    color: var(--mp-signal-empty, #5566aa);
    font-size: 14px;
    padding: 20px 0;
  }

  /* Режим «Тест»: блок фильтров под карточкой (вертикальная карточка БД/лог) */
  .signal-test-filters {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--mp-c-border, #2d3550);
    font-size: 11px;
    line-height: 1.35;
    color: var(--mp-events-text, #9aa8c4);
  }
  .signal-test-filters .stf-row {
    margin-bottom: 8px;
    padding: 6px 8px;
    background: var(--mp-c-surface-2, #171c28);
    border-radius: 6px;
    border: 1px solid var(--mp-c-border, #2a3345);
  }
  .signal-test-filters .stf-title {
    font-weight: 600;
    color: var(--mp-c-text-soft, #c8d4e8);
    margin-bottom: 4px;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 6px 10px;
  }
  .signal-test-filters .stf-title .stf-title-name { flex: 1 1 auto; min-width: 0; }
  .signal-test-filters .stf-title .stf-title-name.ok { color: var(--mp-sound-on, #4caf50); }
  .signal-test-filters .stf-title .stf-title-name.fail { color: var(--mp-err, #e57373); }
  .signal-test-filters .stf-line { word-break: break-word; }
  .signal-test-filters .stf-k { color: var(--mp-c-hint, #6677aa); margin-right: 4px; }
  .signal-test-filters .stf-kv-block {
    font-family: ui-monospace, monospace;
    font-size: 10px;
    line-height: 1.35;
    color: var(--mp-events-text, #9aa8c4);
    padding-left: 2px;
    margin-bottom: 4px;
  }
  .signal-test-filters .stf-fire-meta {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--mp-c-border, #2a3345);
    font-size: 10px;
    line-height: 1.35;
  }
  .signal-test-filters .stf-fire-line.stf-fire-at {
    color: var(--mp-c-hint, #4a5a7a);
    font-variant-numeric: tabular-nums;
  }
  .signal-test-filters .stf-fire-line.stf-fire-elapsed {
    color: var(--mp-cat-active-fg, #8ab88a);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  /* Режим «Тест»: горизонтальная карточка (mode=test) — сетка без горизонтальной прокрутки, до 5 колонок фильтров в зоне ленты */
  .signal-card.signal-card--test {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    border-radius: 12px;
    padding: 8px 10px 8px;
  }
  .signal-card-test-frame {
    width: 100%;
    min-width: 0;
    overflow: hidden;
  }
  .signal-card-test-track {
    display: grid;
    grid-template-columns: 170px 250px minmax(0, 1fr);
    grid-template-areas: "id msg fil";
    gap: 8px 10px;
    align-items: stretch;
    width: 100%;
    min-width: 0;
    padding: 0 0 2px;
  }
  .signal-card--test .sct-col--identity { grid-area: id; }
  .signal-card--test .sct-col--message { grid-area: msg; }
  .signal-card--test .signal-test-filters-slot { grid-area: fil; }
  .signal-card--test .sct-col {
    min-width: 0;
  }
  .signal-card--test .sct-col--identity,
  .signal-card--test .sct-col--message {
    max-width: 100%;
    overflow: hidden;
  }
  .signal-card--test .sct-identity-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    min-width: 0;
    width: 100%;
  }
  .signal-card--test .sct-col--identity .signal-symbol {
    display: block;
    font-weight: 700;
    font-size: 14px;
    margin: 0;
    min-width: 0;
  }
  .signal-card--test .sct-id-rank-score {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.75rem 1.25rem;
    font-size: 12px;
    line-height: 1.3;
    width: 100%;
  }
  .signal-card--test .sct-id-rank {
    color: var(--mp-c-link, #7ab8ff);
    font-weight: 600;
  }
  .signal-card--test .sct-id-screener {
    font-size: 12px;
    color: var(--mp-c-text-muted, #b0bedb);
    line-height: 1.35;
    word-break: break-word;
    width: 100%;
  }
  .signal-card--test .sct-id-links {
    font-size: 12px;
    line-height: 1.45;
    width: 100%;
  }
  .signal-card--test .sct-id-links a {
    color: var(--mp-c-link, #5b9cf6);
    text-decoration: none;
  }
  .signal-card--test .sct-id-links a:hover { text-decoration: underline; }
  .signal-card--test .sct-id-link-row { margin: 0; padding: 0; }
  .signal-card--test .sct-id-exchange {
    font-size: 11px;
    color: var(--mp-c-hint, #445577);
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0;
    max-width: 100%;
  }
  .signal-card--test .sct-id-exchange-sep {
    flex: 0 0 auto;
    padding: 0 0.25em;
  }
  .signal-card--test .sct-id-tracking {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 2px;
  }
  .signal-card--test .sct-id-time {
    font-size: 11px;
    color: var(--mp-c-hint, #4a5a7a);
  }
  .signal-card--test .sct-id-duration {
    font-size: 11px;
    color: var(--mp-cat-active-fg, #8ab88a);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .signal-card--test .sct-col--message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .signal-card--test .scanner-max-strip {
    flex: 0 0 auto;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid var(--mp-c-border, #2f3d5c);
    background: linear-gradient(180deg, var(--mp-c-surface-2, #1e2538) 0%, var(--mp-c-surface-2, #171c28) 100%);
    font-size: 11px;
    line-height: 1.4;
    color: var(--mp-c-text-soft, #b0c0d8);
  }
  .signal-card--test .scanner-max-strip:empty {
    display: none;
  }
  .signal-card--test .scanner-max-line {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 8px;
  }
  .signal-card--test .scanner-max-k {
    color: var(--mp-c-text-muted, #7a8fb0);
    font-weight: 600;
  }
  .signal-card--test .scanner-max-v {
    font-variant-numeric: tabular-nums;
    color: var(--mp-c-link, #9ecbff);
    font-weight: 600;
  }
  .signal-card--test .signal-body {
    margin-bottom: 0;
    white-space: pre-line;
    max-height: none;
    font-size: 12px;
    line-height: 1.35;
  }
  .signal-card--test .signal-footer {
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    margin-top: 0;
    text-align: right;
  }
  .signal-card--test .signal-meta,
  .signal-card--test .signal-time {
    font-size: 11px;
  }

  .signal-test-filters-slot {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  .signal-card--test .sct-filters-inner {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex: 1;
    gap: 4px;
  }
  .signal-card--test .sct-filters-strip {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    gap: 6px;
    align-items: stretch;
    min-width: 0;
    flex: 1 1 auto;
  }
  .signal-card--test .sct-filters-strip .sct-col--filter {
    flex: 1 1 0;
    min-width: 0;
    max-width: none;
  }
  .signal-card--test .sct-col--filter .stf-block {
    font-size: 10px;
    line-height: 1.28;
    color: var(--mp-events-text, #9aa8c4);
    padding: 5px 6px;
    background: linear-gradient(180deg, var(--mp-c-surface, #1a2030) 0%, var(--mp-c-surface-2, #171c28) 100%);
    border-radius: 6px;
    border: 1px solid var(--mp-c-border, #2f3a52);
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .signal-card--test .sct-col--filter .stf-title {
    font-weight: 600;
    color: var(--mp-c-text-soft, #c8d4e8);
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: flex-start;
    gap: 6px 10px;
    font-size: 10px;
    line-height: 1.25;
  }
  .signal-card--test .sct-col--filter .stf-title > .stf-title-name {
    min-width: 0;
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .signal-card--test .sct-col--filter .stf-kv-block {
    font-family: ui-monospace, monospace;
    font-size: 9.5px;
    line-height: 1.35;
    color: var(--mp-events-text, #9aa8c4);
    padding-left: 2px;
  }
  .signal-card--test .sct-col--filter .stf-title > .stf-title-name.ok { color: var(--mp-sound-on, #4caf50); }
  .signal-card--test .sct-col--filter .stf-title > .stf-title-name.fail { color: var(--mp-err, #e57373); }
  .signal-card--test .sct-col--filter .stf-line {
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .signal-card--test .sct-col--filter .stf-k {
    color: var(--mp-c-hint, #5a6a9c);
    margin-right: 3px;
    font-weight: 500;
  }
  .signal-card--test .sct-col--filter .stf-fire-meta {
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid var(--mp-c-border, #2f3a52);
    font-size: 9.5px;
    line-height: 1.35;
  }
  .signal-card--test .sct-col--filter .stf-fire-line.stf-fire-at {
    color: var(--mp-c-hint, #5a6a8a);
    font-variant-numeric: tabular-nums;
  }
  .signal-card--test .sct-col--filter .stf-fire-line.stf-fire-elapsed {
    color: var(--mp-cat-active-fg, #8ab88a);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  @media (max-width: 1100px) {
    .signal-card-test-track {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-areas:
        "id msg"
        "fil fil";
    }
    .signal-card--test .sct-filters-strip {
      flex-wrap: wrap;
    }
    .signal-card--test .sct-filters-strip .sct-col--filter {
      flex: 1 1 calc(50% - 4px);
      min-width: 8rem;
    }
  }

  .signal-test-score {
    display: inline;
    font-size: 11px;
    font-weight: 600;
    color: var(--mp-c-link, #9ec5ff);
    margin-top: 0;
  }
  .signal-card--test .sct-id-rank-score .signal-test-score {
    width: auto;
  }

  /* Счётчик карточек в режиме «Тест» */
  .test-feed-count {
    font-size: 13px;
    color: var(--mp-c-text-muted, #8899bb);
    white-space: nowrap;
    margin-left: 4px;
  }
  .test-feed-count strong { color: var(--mp-c-link, #a8c4ff); font-weight: 700; }

  .test-max-wrap {
    font-size: 13px;
    color: var(--mp-c-text-muted, #8899bb);
    white-space: nowrap;
    margin-left: 8px;
    display: none;
    align-items: center;
    gap: 6px;
  }
  .test-max-wrap label { color: var(--mp-c-text-muted, #8899bb); cursor: pointer; margin: 0; }

  .scanner-runtime-wrap {
    font-size: 12px;
    color: var(--mp-c-text-muted, #8899bb);
    display: none;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 12px;
    margin-left: 4px;
    max-width: 100%;
  }
  .scanner-runtime-wrap input[type="number"] {
    width: 52px;
    background: var(--mp-c-raised, #232a3e);
    color: var(--mp-c-text-soft, #c0ccdd);
    border: 1px solid var(--mp-c-border, #2d3550);
    border-radius: 5px;
    padding: 3px 6px;
    font-size: 12px;
  }
  .scanner-runtime-wrap button.btn-scanner-save {
    background: var(--mp-signal-pill-ok, #2d3a5e);
    color: var(--mp-c-text-soft, #c8d4e8);
    border: 1px solid var(--mp-c-border, #3a4a70);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .scanner-runtime-wrap button.btn-scanner-save:hover { background: var(--mp-signal-pill-ok, #35456a); }

  .signal-card--test.signal-card--locked {
    outline: 1px solid var(--mp-c-hint, #6a7a9a);
    box-shadow: 0 0 0 1px rgba(106,122,154,0.5);
  }
  .signal-card--test .sct-id-stat { font-size: 12px; }
  .signal-card--test .sct-id-stat a.btn-analytics-chart {
    display: inline-block;
    background: var(--mp-c-link, #5b9cf6);
    color: #fff;
    border: 1px solid color-mix(in srgb, var(--mp-c-link, #5b9cf6) 75%, #000);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    line-height: 1.2;
    white-space: nowrap;
  }
  .signal-card--test .sct-id-stat a.btn-analytics-chart:hover {
    filter: brightness(1.08);
    text-decoration: none;
  }
  .signal-card--test .sct-id-stat a.btn-analytics-chart:focus-visible {
    outline: 2px solid var(--mp-c-link, #5b9cf6);
    outline-offset: 2px;
    border-radius: 6px;
  }
  .signal-card--test .sct-stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .signal-card--test .sct-stat-row .sct-id-stat {
    min-width: 0;
  }
  .signal-card--test .sct-stat-row .sct-btn-lock {
    box-sizing: border-box;
    flex-shrink: 0;
    background: var(--mp-c-raised, #2a3145);
    border: 1px solid var(--mp-c-border, #3a4558);
    border-radius: 6px;
    color: var(--mp-cat-done-fg, #aab8d0);
    font-size: 12px;
    line-height: 1.2;
    padding: 5px 12px;
    cursor: pointer;
  }

  /* ── Карточка сигнала (Telegram-стиль) ── */

  /* 3-секундный fade-out — запускается после того, как пользователь увидел карточку */

    0%   { box-shadow: 0 0 0 3px var(--mp-c-link, #3a8ef6), 0 2px 18px rgba(58,142,246,0.55); background: var(--mp-c-surface, #223366); }

  /* Тело сообщения */

  /* ── Кнопка прокрутки вверх + бейдж непрочитанных ── */
  /* ── Кнопка прокрутки вверх ── */
  /* bottom: 28px, right: 28px, size: 44×44 */
  #scroll-top-btn {
    position: fixed;
    bottom: 28px;

  /* Бейдж непрочитанных — фиксированный, в правом верхнем углу кнопки.

  /* ── Адаптив: очень узкий экран ──

<script>
(function () {
  'use strict';

  const MP_SIGNALS_DEMO = {{ is_demo | default(false) | tojson }};

  /* ── Состояние ── */
  let source   = 'test';   // 'test' (Scanner) | 'db' | 'file'
  let page     = 1;
  let perPage  = {{ per_page_default }};
  let totalPages = 1;
  let totalItems = 0;

  let es = null;           // EventSource
  let pendingNew = [];     // накопленные новые сигналы пока юзер на стр. > 1
  let newCount = 0;
  let unreadCount = 0;     // карточки с signal-new, ещё не замеченные пользователем
  let soundEnabled = localStorage.getItem('signals_sound') !== 'false';

  const feed       = document.getElementById('signals-feed');
  const emptyMsg   = document.getElementById('empty-msg');
  const sseDot     = document.getElementById('sse-dot');
  const sseLabel   = document.getElementById('sse-label');
  const newBadge   = document.getElementById('new-badge');
  const newCntEl   = document.getElementById('new-count');
  const scrollBtn   = document.getElementById('scroll-top-btn');
  const unreadBadge = document.getElementById('unread-badge');
  const soundChk    = document.getElementById('sound-enabled');
  const perPageSel  = document.getElementById('per-page-sel');
  const pagTop      = document.getElementById('pagination-top');
  const pagBot      = document.getElementById('pagination-bot');
  const testFeedCountEl = document.getElementById('test-feed-count');
  const testFeedCountNum = document.getElementById('test-feed-count-num');
  const testMaxWrap = document.getElementById('test-max-wrap');
  const testMaxCardsSel = document.getElementById('test-max-cards');
  const scannerRuntimeWrap = document.getElementById('scanner-runtime-wrap');
  const scannerRuntimeSave = document.getElementById('scanner-runtime-save');

  function applyDemoSignalsRestrictions() {
    if (!MP_SIGNALS_DEMO) return;
    if (testMaxCardsSel) {
      for (const opt of testMaxCardsSel.options) {
        opt.disabled = opt.value !== '10';
      }
      testMaxCardsSel.value = '10';
    }
    const pt = document.getElementById('scanner-posttrack');
    const cd = document.getElementById('scanner-cooldown');
    const se = document.getElementById('scanner-stats-enabled');
    if (pt) {
      pt.readOnly = true;
      pt.disabled = true;
    }
    if (cd) {
      cd.readOnly = true;
      cd.disabled = true;
    }
    if (se) se.disabled = true;
    if (scannerRuntimeSave) scannerRuntimeSave.disabled = true;
  }

  const TEST_MAX_ALLOWED = [5, 10, 20, 30, 50, 100];
  const LS_TEST_MAX_VISIBLE = 'signals_test_max_visible';

  /** Подсказки для карточек Scanner / обычных сигналов (native title). */
  const TT_CMC_RANK = 'Место монеты в рейтинге CoinMarketCap';
  const TT_SCORE_FILTERS = 'Средний вклад по фильтрам';
  const TT_SCREENER_NAME = 'Название скринера';
  const TT_EXCHANGE_NAME = 'Название биржи';
  const TT_MARKET_TYPE = 'Тип рынка';
  const TT_SCANNER_STARTED_AT = 'Дата и время запуска скринера';
  const TT_DURATION_SINCE_START = 'Длительность с момента старта';
  const TT_SIGNAL_CREATED_AT = 'Дата и время сигнала';

  function normalizeTestMax(val) {
    const n = parseInt(val, 10);
    return TEST_MAX_ALLOWED.includes(n) ? n : 10;
  }

  /**
   * Строка БД без card_snapshot: та же горизонтальная вёрстка Scanner; блок фильтров — пояснение.
   */
  function dbRowToScannerLayoutItem(row) {
    return {
      ...row,
      mode: 'test',
      scanner_snapshot_frozen: true,
      db_legacy_no_snapshot: true,
      test_filters: [
        {
          id: 'legacy',
          title: 'Снимок Scanner',
          enabled: true,
          ok: true,
          current: {
            info: 'Нет card_snapshot_json — запись до внедрения Scanner Analytics или без trigger. После очистки истории новые сигналы получат полный снимок.',
          },
          thresholds: {},
        },
      ],
      scanner_filter_max_list: [],
      score: null,
      ok_count: null,
      tie_break_score: null,
    };
  }

  /**
   * Режим БД: snapshot → та же карточка, что Scanner; без snapshot → горизонтальная карточка с текстом из БД.
   * Режим лог-файла: при непустом `card_snapshot` из API — тот же путь, что БД; без снимка — узкая legacy-карточка.
   * @param {string} src — 'test' | 'db' | 'file'
   */
  function normalizeItemForCard(item, src) {
    if (!item || item.mode === 'test') return item;
    if (item.card_snapshot && typeof item.card_snapshot === 'object' && Object.keys(item.card_snapshot).length) {
      const snap = item.card_snapshot;
      return {
        ...snap,
        id: item.id,
        created_at: item.created_at,
        screener_name: item.screener_name != null ? item.screener_name : snap.screener_name,
        screener_id: item.screener_id,
        exchange: item.exchange != null ? item.exchange : snap.exchange,
        market_type: item.market_type != null ? item.market_type : snap.market_type,
        symbol: item.symbol != null ? item.symbol : snap.symbol,
        telegram_ok: item.telegram_ok,
        tracking_id: item.tracking_id,
        stat_href: item.stat_href,
        mode: 'test',
        scanner_snapshot_frozen: true,
      };
    }
    if (src === 'db') {
      return dbRowToScannerLayoutItem(item);
    }
    return item;
  }

  async function refreshScannerRuntimeUi() {
    try {
      const r = await fetch('/admin_api/scanner/runtime-settings', { credentials: 'same-origin' });
      if (!r.ok) return;
      const d = await r.json();
      const pt = document.getElementById('scanner-posttrack');
      const cd = document.getElementById('scanner-cooldown');
      const se = document.getElementById('scanner-stats-enabled');
      if (pt) pt.value = String(d.posttracking_minutes ?? 0);
      if (cd) cd.value = String(d.cooldown_hours ?? 0);
      if (se) se.checked = !!d.statistics_enabled;
      const mc = d.max_cards;
      if (testMaxCardsSel && mc != null) {
        const m = parseInt(mc, 10);
        if (Number.isFinite(m) && !TEST_MAX_ALLOWED.includes(m)) {
          const opt = document.createElement('option');
          opt.value = String(m);
          opt.textContent = String(m);
          testMaxCardsSel.appendChild(opt);
        }
        if (Number.isFinite(m)) testMaxCardsSel.value = String(m);
      }
    } catch (_) {}
  }

  async function saveScannerRuntime() {
    if (MP_SIGNALS_DEMO) return;
    const params = new URLSearchParams();
    if (testMaxCardsSel) params.set('max_cards', testMaxCardsSel.value);
    const pt = document.getElementById('scanner-posttrack');
    const cd = document.getElementById('scanner-cooldown');
    const se = document.getElementById('scanner-stats-enabled');
    if (pt) params.set('posttracking_minutes', pt.value);
    if (cd) params.set('cooldown_hours', cd.value);
    if (se) params.set('statistics_enabled', se.checked ? 'true' : 'false');
    try {
      const r = await fetch('/admin_api/scanner/runtime-settings?' + params.toString(), { method: 'POST', credentials: 'same-origin' });
      if (r.ok) await refreshScannerRuntimeUi();
    } catch (_) {}
  }

  function setupTestCardActions(div) {
    const frozen = div.dataset.scannerSnapshotFrozen === '1';
    const lockBtn = div.querySelector('.sct-btn-lock');
    const closeBtn = div.querySelector('.sct-btn-close');
    if (frozen) {
      if (lockBtn) lockBtn.style.display = 'none';
      if (closeBtn) closeBtn.style.display = 'none';
      return;
    }
    if (lockBtn && !lockBtn._wired) {
      lockBtn._wired = true;
      lockBtn.textContent = '🔓';
      lockBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const locked = div.dataset.scannerLocked === '1';
        if (locked) {
          div.dataset.scannerLocked = '';
          div.classList.remove('signal-card--locked');
          lockBtn.textContent = '🔓';
        } else {
          div.dataset.scannerLocked = '1';
          div.classList.add('signal-card--locked');
          lockBtn.textContent = '🔒';
        }
        reorderTestFeed();
      });
    }
    if (closeBtn && !closeBtn._wired) {
      closeBtn._wired = true;
      closeBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const tid = closeBtn.dataset.trackingId || div.dataset.trackingId;
        if (!tid) return;
        try {
          const r = await fetch('/admin_api/scanner/close?tracking_id=' + encodeURIComponent(tid), { method: 'POST', credentials: 'same-origin' });
          if (r.ok) {
            div.remove();
            updateTestFeedCount();
          }
        } catch (_) {}
      });
    }
  }

  function applyTestMaxToSelect() {
    if (!testMaxCardsSel) return;
    const saved = normalizeTestMax(localStorage.getItem(LS_TEST_MAX_VISIBLE));
    testMaxCardsSel.value = String(saved);
  }

  function trimTestFeedToMax() {
    if (source !== 'test') return;
    const max = normalizeTestMax(testMaxCardsSel ? testMaxCardsSel.value : '10');
    const cards = [...feed.querySelectorAll('.signal-card')];
    for (let i = max; i < cards.length; i++) {
      cards[i].remove();
    }
  }

  function updateTestFeedCount() {
    if (!testFeedCountNum) return;
    const n = feed.querySelectorAll('.signal-card').length;
    testFeedCountNum.textContent = String(n);
  }

  function reorderTestFeed() {
    if (source !== 'test') return;
    const cards = [...feed.querySelectorAll('.signal-card')];
    if (!cards.length) {
      updateTestFeedCount();
      return;
    }
    const parseScore = (el) => {
      const v = parseFloat(el.dataset.testScore);
      return Number.isFinite(v) ? v : Number.NEGATIVE_INFINITY;
    };
    const cmp = (a, b) => {
      const d0 = parseScore(b) - parseScore(a);
      if (d0 !== 0) return d0;
      const okA = parseInt(a.dataset.okCount, 10) || 0;
      const okB = parseInt(b.dataset.okCount, 10) || 0;
      const d1 = okB - okA;
      if (d1 !== 0) return d1;
      const fa = parseFloat(a.dataset.tieScore) || 0;
      const fb = parseFloat(b.dataset.tieScore) || 0;
      const d2 = fb - fa;
      if (d2 !== 0) return d2;
      return String(a.dataset.id || '').localeCompare(String(b.dataset.id || ''));
    };
    const locked = cards.filter((c) => c.dataset.scannerLocked === '1');
    const unlocked = cards.filter((c) => c.dataset.scannerLocked !== '1');
    unlocked.sort(cmp);
    const ordered = [...locked, ...unlocked];
    ordered.forEach((c) => feed.appendChild(c));
    trimTestFeedToMax();
    updateTestFeedCount();
  }

  function setTestModeUi(isTest) {
    perPageSel.style.display = isTest ? 'none' : '';
    pagTop.style.display = isTest ? 'none' : '';
    pagBot.style.display = isTest ? 'none' : '';
    newBadge.style.display = isTest ? 'none' : '';
    if (testFeedCountEl) {
      testFeedCountEl.style.display = isTest ? '' : 'none';
      if (!isTest && testFeedCountNum) testFeedCountNum.textContent = '0';
    }
    if (testMaxWrap) {
      testMaxWrap.style.display = isTest ? 'inline-flex' : 'none';
      if (isTest) applyTestMaxToSelect();
      if (isTest) applyDemoSignalsRestrictions();
    }
    if (scannerRuntimeWrap) {
      scannerRuntimeWrap.style.display = isTest ? 'inline-flex' : 'none';
      if (isTest) refreshScannerRuntimeUi();
    }
  }

  function updatePurgeButtons() {
    const bDb = document.getElementById('btn-purge-db');
    const bLog = document.getElementById('btn-purge-log');
    if (MP_SIGNALS_DEMO) {
      if (bDb) {
        bDb.style.display = source === 'db' ? 'inline-block' : 'none';
        bDb.disabled = true;
      }
      if (bLog) {
        bLog.style.display = source === 'file' ? 'inline-block' : 'none';
        bLog.disabled = true;
      }
      return;
    }
    if (bDb) {
      bDb.style.display = source === 'db' ? 'inline-block' : 'none';
      bDb.disabled = false;
    }
    if (bLog) {
      bLog.style.display = source === 'file' ? 'inline-block' : 'none';
      bLog.disabled = false;
    }
  }

  function wirePurgeButtons() {
    const bDb = document.getElementById('btn-purge-db');
    const bLog = document.getElementById('btn-purge-log');
    async function postPurge(target) {
      const label = target === 'db' ? 'все записи в таблице signals' : 'файл signals_log.txt';
      if (!window.confirm('Очистить ' + label + '?')) return;
      const btn = target === 'db' ? bDb : bLog;
      if (btn) btn.disabled = true;
      try {
        const r = await fetch('/admin_api/signals/purge?target=' + encodeURIComponent(target), { method: 'POST', credentials: 'same-origin' });
        if (!r.ok) {
          let msg = 'HTTP ' + r.status;
          try {
            const j = await r.json();
            if (j.detail) msg = typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail);
          } catch { /* use msg */ }
          throw new Error(msg);
        }
        await loadPage(page);
      } catch (e) {
        alert('Ошибка: ' + e.message);
      } finally {
        if (btn) btn.disabled = false;
      }
    }
    if (bDb && !bDb._purgeWired) {
      bDb._purgeWired = true;
      bDb.addEventListener('click', () => postPurge('db'));
    }
    if (bLog && !bLog._purgeWired) {
      bLog._purgeWired = true;
      bLog.addEventListener('click', () => postPurge('log'));
    }
  }

  function playSignalBeep() {
    if (!soundEnabled) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 1);
      osc.onended = () => ctx.close();
    } catch {}
  }

  /* Помечает все непрочитанные карточки как прочитанные и скроллит наверх */

  function fmt_time(iso) {
    if (!iso) return '';
    if (window.MpAdminTime && typeof window.MpAdminTime.formatTime === 'function') {
      return window.MpAdminTime.formatTime(iso);
    }
    try {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    } catch { return iso; }
  }

  function fmt_date(iso) {
    if (!iso) return '';
    if (window.MpAdminTime && typeof window.MpAdminTime.formatDateTime === 'function') {
      return window.MpAdminTime.formatDateTime(iso);
    }
    try {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    } catch { return iso; }
  }

  /* Извлекаем CMC-ранг: сначала из текста сигнала, иначе live-значение из API */
  function extractCmcRank(text, liveFallback) {
    const m = (text || '').match(/#(\d+)/);
    if (m) return m[1];
    return liveFallback != null ? String(liveFallback) : null;
  }

  function isFirstDailySignal(text) {
    const firstLine = (text || '').split('\n')[0];
    return firstLine.includes('🔔');
  }

  /**
   * Значения параметров в режиме «Тест»: числа — до 4 знаков после запятой (убираем float-артефакты вроде -0.000029999999999998778).
   */
  function fmtTestFilterScalar(v) {
    if (v === null || v === undefined) return String(v);
    if (typeof v === 'boolean') return String(v);
    if (typeof v === 'object') return String(v);
    let num = null;
    if (typeof v === 'number') {
      if (!Number.isFinite(v)) return String(v);
      num = v;
    } else if (typeof v === 'string') {
      const t = v.trim();
      if (t === '') return v;
      const n = Number(t);
      if (!Number.isFinite(n)) return v;
      num = n;
    } else {
      return String(v);
    }
    return String(parseFloat(num.toFixed(4)));
  }

  /** Плоский текст для обратной совместимости (одна строка). */
  function fmtThresholdsObj(o) {
    if (!o || typeof o !== 'object') return '—';
    const parts = Object.entries(o).filter(([, v]) => v !== null && v !== undefined);
    if (!parts.length) return '—';
    return parts.map(([k, v]) => k + '=' + fmtTestFilterScalar(v)).join(' · ');
  }

  /**
   * HTML: каждое key=value с новой строки.
   * filterId + section: для LQ в «Текущее» `lq_pct_of_daily_volume` вверху (порядок ключей в JSON/SSE часто лексикографический).
   */
  function fmtThresholdsObjHtml(o, filterId, section) {
    if (!o || typeof o !== 'object') return '—';
    let parts = Object.entries(o).filter(([, v]) => v !== null && v !== undefined);
    if (filterId === 'lq' && section === 'current') {
      const pri = 'lq_pct_of_daily_volume';
      const idx = parts.findIndex(([k]) => k === pri);
      if (idx > 0) {
        const row = parts.splice(idx, 1)[0];
        parts.unshift(row);
      }
    }
    if (!parts.length) return '—';
    return parts.map(([k, v]) => escHtml(k + '=' + fmtTestFilterScalar(v))).join('<br>');
  }

  /**
   * Разбор telegram_text (DEFAULT): убрать шапку и футер со ссылками, строку «Сигналов за 24ч».
   */
  function parseTestModeTelegramHtml(telegramText) {
    const raw = telegramText || '';
    const segments = raw.split(/\n\n+/).map(s => s.trim()).filter(s => s.length);
    if (segments.length < 2) {
      const firstNl = raw.indexOf('\n');
      const rest = firstNl !== -1 ? raw.substring(firstNl + 1) : '';
      return { bodyHtml: rest, links: [] };
    }
    const lastSeg = segments[segments.length - 1];
    const isFooter = /🔗/.test(lastSeg) && /<a\s/i.test(lastSeg);
    let bodySegments = segments.slice(1);
    const links = [];
    if (isFooter) {
      bodySegments = segments.slice(1, -1);
      const linkRe = /<a\s+[^>]*href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
      let m;
      while ((m = linkRe.exec(lastSeg)) !== null) {
        const label = m[2].replace(/<[^>]+>/g, '').trim();
        links.push({ href: m[1], label: label || 'link' });
      }
    }
    let bodyHtml = bodySegments.join('\n\n');
    bodyHtml = bodyHtml.replace(/⦁\s*Сигналов за 24ч:\s*[^\n<]*/gi, '');
    bodyHtml = bodyHtml.replace(/Сигналов за 24ч:\s*[\d]+/gi, '');
    return { bodyHtml: bodyHtml.trim(), links };
  }

  function renderFilterFireMetaHtml(meta) {
    if (!meta || meta.fire_at == null) return '';
    const at = fmt_date(String(meta.fire_at));
    const elapsed = fmtElapsedHmsAndSec(meta.fire_elapsed_ms);
    return (
      '<div class="stf-fire-meta">'
      + `<div class="stf-fire-line stf-fire-at">${escHtml(at)}</div>`
      + `<div class="stf-fire-line stf-fire-elapsed">${escHtml(elapsed)}</div>`
      + '</div>'
    );
  }

  function renderTestFiltersHtml(rows, layoutHorizontal) {
    if (!rows || !rows.length) return '';
    function filterTitleHtml(r) {
      const st = r.ok ? 'ok' : 'fail';
      return `<span class="stf-title-name ${st}">${escHtml(r.title)}</span>`;
    }
    function oneFilterBlockHorizontal(r) {
      let b = '<div class="stf-block">';
      b += `<div class="stf-title">${filterTitleHtml(r)}</div>`;
      if (r.filter_score != null && r.filter_score !== undefined) {
        b += `<div class="stf-line"><span class="stf-k">Вклад:</span> ${escHtml(fmtTestFilterScalar(r.filter_score))}</div>`;
      }
      b += '<div class="stf-line"><span class="stf-k">Текущее:</span></div>';
      b += `<div class="stf-kv-block">${fmtThresholdsObjHtml(r.current, r.id, 'current')}</div>`;
      b += '<div class="stf-line"><span class="stf-k">Пороги:</span></div>';
      b += `<div class="stf-kv-block">${fmtThresholdsObjHtml(r.thresholds, r.id, 'thresholds')}</div>`;
      b += renderFilterFireMetaHtml(r.fire_meta);
      b += '</div>';
      return b;
    }
    if (layoutHorizontal) {
      let h = '<div class="sct-filters-inner">';
      h += '<div class="sct-filters-strip">';
      for (let i = 0; i < rows.length; i++) {
        h += `<section class="sct-col sct-col--filter">${oneFilterBlockHorizontal(rows[i])}</section>`;
      }
      h += '</div></div>';
      return h;
    }
    let h = '';
    for (const r of rows) {
      h += '<div class="stf-row">';
      h += `<div class="stf-title">${filterTitleHtml(r)}</div>`;
      if (r.filter_score != null && r.filter_score !== undefined) {
        h += `<div class="stf-line"><span class="stf-k">Вклад:</span> ${escHtml(fmtTestFilterScalar(r.filter_score))}</div>`;
      }
      h += '<div class="stf-line"><span class="stf-k">Текущее:</span></div>';
      h += `<div class="stf-kv-block">${fmtThresholdsObjHtml(r.current, r.id, 'current')}</div>`;
      h += '<div class="stf-line"><span class="stf-k">Пороги:</span></div>';
      h += `<div class="stf-kv-block">${fmtThresholdsObjHtml(r.thresholds, r.id, 'thresholds')}</div>`;
      h += renderFilterFireMetaHtml(r.fire_meta);
      h += '</div>';
    }
    return h;
  }

  function applyTestIdentity(div, item, parsedLinks) {
    const rank = extractCmcRank(item.telegram_text, item.cmc_rank);
    const rankEl = div.querySelector('.sct-id-rank');
    if (rankEl) {
      rankEl.textContent = rank ? ('#' + rank) : '';
      rankEl.style.display = rank ? '' : 'none';
    }
    const scrEl = div.querySelector('.sct-id-screener');
    if (scrEl) {
      const sn = item.screener_name != null ? String(item.screener_name) : '';
      scrEl.textContent = sn;
      scrEl.style.display = sn ? '' : 'none';
    }
    const linksEl = div.querySelector('.sct-id-links');
    if (linksEl) {
      linksEl.innerHTML = '';
      const list = parsedLinks && parsedLinks.length ? parsedLinks : [];
      for (const l of list) {
        const row = document.createElement('div');
        row.className = 'sct-id-link-row';
        row.appendChild(document.createTextNode('🔗 '));
        const a = document.createElement('a');
        a.href = l.href;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = l.label;
        row.appendChild(a);
        linksEl.appendChild(row);
      }
    }
    const exEl = div.querySelector('.sct-id-exchange');
    if (exEl) {
      const nameEl = exEl.querySelector('.sct-id-exchange-name');
      const sepEl = exEl.querySelector('.sct-id-exchange-sep');
      const marketEl = exEl.querySelector('.sct-id-exchange-market');
      const ex = (item.exchange || '').toUpperCase();
      const mt = (item.market_type || '').toUpperCase();
      if (nameEl && sepEl && marketEl) {
        nameEl.textContent = ex;
        marketEl.textContent = mt;
        nameEl.style.display = ex ? '' : 'none';
        marketEl.style.display = mt ? '' : 'none';
        sepEl.style.display = ex && mt ? '' : 'none';
      } else {
        exEl.textContent = ex && mt ? (ex + ' - ' + mt) : (ex || mt || '');
      }
    }
    const statWrap = div.querySelector('.sct-id-stat');
    if (statWrap) {
      statWrap.textContent = '';
      if (item.stat_href) {
        const a = document.createElement('a');
        a.href = item.stat_href;
        a.className = 'btn-analytics-chart';
        a.textContent = 'График';
        statWrap.appendChild(a);
        statWrap.style.display = '';
      } else {
        statWrap.style.display = 'none';
      }
    }
    /* Не использовать created_at как единственный fallback: он обновляется на каждом снимке и сбрасывает счётчик.
       Берём самую раннюю метку из сервера, уже показанной на карточке и created_at. */
    let trackedIso = '';
    let bestMs = Infinity;
    for (const iso of [item.scanner_tracked_since, div.dataset.scannerTrackedSince, item.created_at]) {
      if (!iso) continue;
      const ms = Date.parse(String(iso));
      if (!Number.isFinite(ms)) continue;
      if (ms < bestMs) {
        bestMs = ms;
        trackedIso = String(iso);
      }
    }
    div.dataset.scannerTrackedSince = trackedIso;
    const timeId = div.querySelector('.sct-id-time');
    if (timeId) timeId.textContent = trackedIso ? fmt_date(trackedIso) : '';
    updateScannerDurationForCard(div);
  }

  function parseIsoToMs(iso) {
    if (!iso) return null;
    const t = Date.parse(String(iso));
    return Number.isFinite(t) ? t : null;
  }

  function fmtDurationHms(elapsedMs) {
    let ms = elapsedMs;
    if (ms < 0) ms = 0;
    const sec = Math.floor(ms / 1000);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    const pad = n => String(n).padStart(2, '0');
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  /** Фиксированная длительность в формате как у счётчика карточки: ЧЧ:ММ:СС, Ns */
  function fmtElapsedHmsAndSec(elapsedMs) {
    let ms = Number(elapsedMs);
    if (!Number.isFinite(ms) || ms < 0) ms = 0;
    const sec = Math.floor(ms / 1000);
    return fmtDurationHms(ms) + ', ' + sec + 's';
  }

  function updateScannerDurationForCard(card) {
    if (!card || !card.classList || !card.classList.contains('signal-card--test')) return;
    const durEl = card.querySelector('.sct-id-duration');
    if (!durEl) return;
    if (card.dataset.scannerSnapshotFrozen === '1') {
      const raw = card.dataset.scannerDurationAtTriggerMs;
      const ms = raw !== undefined && raw !== '' ? Number(raw) : NaN;
      if (Number.isFinite(ms) && ms >= 0) {
        durEl.textContent = fmtElapsedHmsAndSec(ms);
      } else {
        durEl.textContent = '';
      }
      return;
    }
    const iso = card.dataset.scannerTrackedSince;
    const start = parseIsoToMs(iso);
    if (start == null) {
      durEl.textContent = '';
      return;
    }
    const elapsed = Date.now() - start;
    durEl.textContent = fmtElapsedHmsAndSec(elapsed);
  }

  function updateAllScannerDurationDisplays() {
    if (source !== 'test') return;
    feed.querySelectorAll('.signal-card--test').forEach(updateScannerDurationForCard);
  }

  /** Блок «max …» над телом сообщения Scanner (накопленные пики по фильтрам). */
  function renderScannerMaxStripHtml(list) {
    if (!list || !list.length) return '';
    return list.map((row) => (
      '<div class="scanner-max-line"><span class="scanner-max-k">max ' + escHtml(String(row.title || row.id || '')) + ':</span> '
      + '<span class="scanner-max-v">' + escHtml(fmtTestFilterScalar(row.value)) + '</span></div>'
    )).join('');
  }

  function applyCardData(div, item) {
    if (item.scanner_snapshot_frozen) {
      div.dataset.scannerSnapshotFrozen = '1';
      const dm = item.scanner_duration_at_trigger_ms;
      if (dm != null && dm !== undefined && Number.isFinite(Number(dm))) {
        div.dataset.scannerDurationAtTriggerMs = String(Math.max(0, Number(dm)));
      } else {
        delete div.dataset.scannerDurationAtTriggerMs;
      }
    } else {
      delete div.dataset.scannerSnapshotFrozen;
      delete div.dataset.scannerDurationAtTriggerMs;
    }
    const bodyDiv = div.querySelector('.signal-body');
    const isTest = item.mode === 'test';
    if (isTest && bodyDiv) {
      const parsed = parseTestModeTelegramHtml(item.telegram_text || '');
      bodyDiv.innerHTML = parsed.bodyHtml;
      applyTestIdentity(div, item, parsed.links);
    } else if (bodyDiv) {
      let bodyText = item.telegram_text || '';
      const firstNl = bodyText.indexOf('\n');
      if (firstNl !== -1) {
        bodyText = bodyText.substring(firstNl + 1);
      } else {
        bodyText = '';
      }
      bodyDiv.innerHTML = bodyText;
    }
    if (bodyDiv) {
      bodyDiv.querySelectorAll('a').forEach(a => {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
    }
    const maxStrip = div.querySelector('.scanner-max-strip');
    if (maxStrip && item.mode === 'test') {
      const html = renderScannerMaxStripHtml(item.scanner_filter_max_list);
      maxStrip.innerHTML = html;
      maxStrip.style.display = html ? '' : 'none';
    }
    const timeEl = div.querySelector('.signal-time');
    if (timeEl) timeEl.textContent = fmt_date(item.created_at);

    const testSlot = div.querySelector('.signal-test-filters-slot');
    let testEl = div.querySelector('.signal-test-filters');
    if (item.mode === 'test' && testSlot) {
      if (item.test_filters && item.test_filters.length) {
        testSlot.innerHTML = renderTestFiltersHtml(item.test_filters, true);
      } else {
        testSlot.innerHTML = '';
      }
      if (testEl) testEl.remove();
    } else {
      if (item.test_filters && item.test_filters.length) {
        if (!testEl) {
          testEl = document.createElement('div');
          testEl.className = 'signal-test-filters';
          const footer = div.querySelector('.signal-footer');
          if (footer) div.insertBefore(testEl, footer);
        }
        testEl.innerHTML = renderTestFiltersHtml(item.test_filters, false);
      } else if (testEl) {
        testEl.remove();
      }
    }

    const scoreEl = div.querySelector('.signal-test-score');
    if (scoreEl) scoreEl.title = TT_SCORE_FILTERS;
    if (item.mode === 'test' || (item.test_filters && item.test_filters.length)) {
      let oc = item.ok_count;
      let ts = item.tie_break_score;
      if (oc == null && item.test_filters) {
        oc = item.test_filters.filter(r => r.ok).length;
      }
      if (ts == null || ts === undefined || Number.isNaN(Number(ts))) {
        ts = 0;
      }
      div.dataset.okCount = String(oc != null ? oc : 0);
      div.dataset.tieScore = String(Number(ts));
      const sc = item.score;
      if (sc != null && sc !== undefined && !Number.isNaN(Number(sc))) {
        div.dataset.testScore = String(Number(sc));
      } else {
        delete div.dataset.testScore;
      }
      if (scoreEl) {
        if (sc != null && sc !== undefined && !Number.isNaN(Number(sc))) {
          scoreEl.textContent = 'Score: ' + fmtTestFilterScalar(Number(sc));
          scoreEl.style.display = '';
        } else {
          scoreEl.textContent = '';
          scoreEl.style.display = 'none';
        }
      }
    } else {
      delete div.dataset.okCount;
      delete div.dataset.tieScore;
      delete div.dataset.testScore;
      if (scoreEl) {
        scoreEl.textContent = '';
        scoreEl.style.display = 'none';
      }
    }

    if (item.mode === 'test') {
      const tid = item.tracking_id;
      if (tid) div.dataset.trackingId = tid;
      else delete div.dataset.trackingId;
      const closeBtn = div.querySelector('.sct-btn-close');
      if (closeBtn) {
        const show = !!(item.scanner_show_close && tid);
        closeBtn.style.display = show ? '' : 'none';
        closeBtn.dataset.trackingId = tid || '';
      }
    }
  }

  function findCardById(id) {
    return [...feed.querySelectorAll('.signal-card')].find(c => String(c.dataset.id) === String(id)) || null;
  }

  /** Одна карточка на tracking_id в режимах БД / лог-файл (обновление вместо дубля при SSE). */
  function findCardByTrackingId(tid) {
    if (!tid) return null;

    return [...feed.querySelectorAll('.signal-card')].find(c => String(c.dataset.trackingId || '') === s) || null;

  /* Строим HTML карточки */

                <span class="sym-text">${escHtml(symbol)}</span>
              </div>
              <div class="sct-id-rank-score">
                <span class="sct-id-rank signal-num" title="${escHtml(TT_CMC_RANK)}"></span>
                <span class="sct-id-score signal-test-score" style="display:none" title="${escHtml(TT_SCORE_FILTERS)}"></span>
              </div>
              <div class="sct-id-screener" title="${escHtml(TT_SCREENER_NAME)}"></div>
              <div class="sct-id-links"></div>
              <div class="sct-stat-row">
                <div class="sct-id-stat" style="display:none"></div>
                <button type="button" class="sct-btn-lock" title="Закрепить — не участвует в сортировке">🔓</button>
              </div>
              <div class="sct-id-actions">
                <button type="button" class="sct-btn-close" style="display:none" title="Закрыть посттрекинг">✕</button>
              </div>
              <div class="sct-id-exchange">
                <span class="sct-id-exchange-name" title="${escHtml(TT_EXCHANGE_NAME)}"></span><span class="sct-id-exchange-sep"> - </span><span class="sct-id-exchange-market" title="${escHtml(TT_MARKET_TYPE)}"></span>
              </div>
              <div class="sct-id-tracking">
                <div class="sct-id-time" title="${escHtml(TT_SCANNER_STARTED_AT)}"></div>
                <div class="sct-id-duration" title="${escHtml(TT_DURATION_SINCE_START)}"></div>
              </div>
            </div>
          </section>
          <section class="sct-col sct-col--message">
            <div class="scanner-max-strip" style="display:none"></div>
            <div class="signal-body"></div>
          </section>
          <div class="signal-test-filters-slot"></div>
        </div>
      </div>`;
    } else {
      const exF = (item.exchange || '').toUpperCase();
      const mtF = (item.market_type || '').toUpperCase();
      let metaFoot = '';
      if (exF && mtF) {
        metaFoot = `<span class="signal-meta-ex" title="${escHtml(TT_EXCHANGE_NAME)}">${escHtml(exF)}</span><span class="signal-meta-sep"> · </span><span class="signal-meta-mt" title="${escHtml(TT_MARKET_TYPE)}">${escHtml(mtF)}</span>`;
      } else if (exF) {
        metaFoot = `<span class="signal-meta-ex" title="${escHtml(TT_EXCHANGE_NAME)}">${escHtml(exF)}</span>`;
      } else if (mtF) {
        metaFoot = `<span class="signal-meta-mt" title="${escHtml(TT_MARKET_TYPE)}">${escHtml(mtF)}</span>`;
      }
      div.innerHTML = `
      <div class="signal-header">
        ${headerInner}
      </div>
      <div class="signal-body"></div>
      <div class="signal-footer">
        <span class="signal-meta">${metaFoot}</span>
        <span class="signal-time" title="${escHtml(TT_SIGNAL_CREATED_AT)}">${escHtml(fmt_date(item.created_at))}</span>
      </div>`;
    }

    applyCardData(div, item);

    if (isTest) setupTestCardActions(div);

    // Клик по заголовку символа → копировать в буфер
    div.querySelector('.signal-symbol').addEventListener('click', () => {
      navigator.clipboard.writeText(symbol).then(() => {
        const el = div.querySelector('.sym-text');
        el.style.transition = 'color 0.15s';
        el.style.color = 'var(--mp-sound-on, #4caf50)';
        setTimeout(() => { el.style.color = ''; }, 700);
      }).catch(() => {});
    });

    if (isNew) {
      watchCard(div);
    }
    return div;
  }

  /* ── Умная подсветка: ждём пока карточка видна И пользователь активен ── */
  function watchCard(card) {
    let isVisible = false;
    let hasAction = false;
    let triggered = false;

    function triggerCard() {
      if (triggered) return;
      triggered = true;
      observer.disconnect();
      window.removeEventListener('mousemove', onAction);
      window.removeEventListener('mousedown', onAction);
      card._forceRead = null;
      card.classList.remove('signal-new');
      card.classList.add('signal-seen');
      setTimeout(() => card.classList.remove('signal-seen'), 3100);
      unreadCount = Math.max(0, unreadCount - 1);
      updateUnreadBtn();
    }

    // Позволяет внешнему коду принудительно пометить карточку как прочитанную
    card._forceRead = triggerCard;

    function tryTrigger() {
      if (triggered || !isVisible || !hasAction) return;
      triggerCard();
    }

    const observer = new IntersectionObserver(([entry]) => {
      isVisible = entry.isIntersecting;
      tryTrigger();
    }, { threshold: 0.2 });

    function onAction() {
      hasAction = true;
      tryTrigger();
    }

    observer.observe(card);
    window.addEventListener('mousemove', onAction, { passive: true });
    window.addEventListener('mousedown', onAction, { passive: true });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ── Пагинация ── */
  function renderPagination(containerId) {
    const bar = document.getElementById(containerId);
    bar.innerHTML = '';

    if (totalPages <= 1 && totalItems === 0) return;

    const info = document.createElement('span');
    info.className = 'pagination-info';
    info.textContent = `${totalItems} сигналов`;
    bar.appendChild(info);

    const prev = document.createElement('button');
    prev.textContent = '←';
    prev.disabled = page <= 1;
    prev.onclick = () => loadPage(page - 1);
    bar.appendChild(prev);

    // Показываем окно страниц вокруг текущей
    const pages = [];
    pages.push(1);
    for (let p = Math.max(2, page - 2); p <= Math.min(totalPages - 1, page + 2); p++) pages.push(p);
    if (totalPages > 1) pages.push(totalPages);

    let lastP = 0;
    for (const p of pages) {
      if (lastP && p - lastP > 1) {
        const gap = document.createElement('span');
        gap.textContent = '…';
        gap.style.cssText = 'color:var(--mp-c-hint, #445577);padding:0 4px;font-size:13px';
        bar.appendChild(gap);
      }
      const btn = document.createElement('button');
      btn.textContent = p;
      if (p === page) btn.classList.add('active');
      btn.onclick = () => loadPage(p);
      bar.appendChild(btn);
      lastP = p;
    }

    const next = document.createElement('button');
    next.textContent = '→';
    next.disabled = page >= totalPages;
    next.onclick = () => loadPage(page + 1);
    bar.appendChild(next);
  }

  /* ── Загрузка страницы ── */
  async function loadPage(p) {
    page = p;
    pendingNew = [];
    newCount = 0;
    newBadge.classList.remove('visible');
    unreadCount = 0;
    updateUnreadBtn();

    emptyMsg.style.display = 'block';
    emptyMsg.textContent = 'Загрузка…';
    feed.innerHTML = '';
    feed.appendChild(emptyMsg);

    try {
      const url = `/admin_api/signals?source=${source}&page=${p}&per_page=${perPage}`;
      const resp = await fetch(url, { credentials: 'same-origin' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      totalPages = data.pages || 1;
      totalItems = data.total || 0;

      setTestModeUi(source === 'test');

      renderPagination('pagination-top');
      renderPagination('pagination-bot');

      feed.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        const em = document.createElement('div');
        em.className = 'signals-empty';
        if (source === 'test') {
          em.textContent = 'Scanner: ждите пары, где после гейтов (USDT, свечи, списки) хотя бы один включённый фильтр даёт OK. История не хранится — только live SSE.';
        } else {
          em.textContent = source === 'db'
            ? 'Сигналов в БД пока нет. Они появятся, как только скринер отправит первый сигнал.'
            : 'Лог-файл пуст или не найден.';
        }
        feed.appendChild(em);
        if (source === 'test') updateTestFeedCount();
      } else {
        for (const raw of data.items) {
          feed.appendChild(buildCard(normalizeItemForCard(raw, source), false));
        }
        if (source === 'test') {
          reorderTestFeed();
          updateTestFeedCount();
        }
      }
    } catch (e) {
      emptyMsg.textContent = 'Ошибка загрузки: ' + e.message;
    }

    // Переключаем SSE только при первой загрузке или смене источника
    startSSE();
    updatePurgeButtons();
  }

  /* ── SSE ── */
  function startSSE() {
    if (es) { es.close(); es = null; }
    setSseStatus('connecting');

    es = new EventSource(`/admin_api/signals/stream?source=${source}`);

    es.onopen = () => setSseStatus('ok');

    es.onmessage = (evt) => {
      let item;
      try { item = JSON.parse(evt.data); } catch { return; }
      item = normalizeItemForCard(item, source);

      if (item.mode === 'test' && source === 'test') {
        const existing = findCardById(item.id);
        if (existing) {
          applyCardData(existing, item);
          reorderTestFeed();
          return;
        }
      }

      if ((source === 'file' || source === 'db') && item.tracking_id) {
        const existingTr = findCardByTrackingId(item.tracking_id);
        if (existingTr) {
          existingTr.dataset.id = String(item.id);
          applyCardData(existingTr, item);
          return;
        }
      }

      playSignalBeep();

      if (page !== 1) {
        pendingNew.push(item);
        newCount++;
        newCntEl.textContent = newCount;
        newBadge.classList.add('visible');
        return;
      }

      const empty = feed.querySelector('.signals-empty');
      if (empty) empty.remove();

      const card = buildCard(item, true);
      if (feed.firstChild && feed.firstChild.className && feed.firstChild.className.includes('signal-card')) {
        feed.insertBefore(card, feed.firstChild);
      } else {
        feed.innerHTML = '';
        feed.appendChild(card);
      }
      if (source !== 'test') {
        unreadCount++;
        updateUnreadBtn();
        totalItems++;
        renderPagination('pagination-top');
        renderPagination('pagination-bot');
      } else {
        reorderTestFeed();
      }
    };

    es.onerror = () => {
      setSseStatus('error');
      // EventSource сам переподключается; просто обновляем статус
    };
  }

  /* ── Переключатели ── */
  window.switchSource = function(src) {
    if (source === src) return;
    source = src;
    document.getElementById('btn-src-db').classList.toggle('active', src === 'db');
    document.getElementById('btn-src-file').classList.toggle('active', src === 'file');
    document.getElementById('btn-src-test').classList.toggle('active', src === 'test');
    page = 1;
    loadPage(1);
  };

  window.changePerPage = function(val) {
    perPage = parseInt(val, 10);
    page = 1;
    loadPage(1);
  };

  window.changeTestMaxCards = function(val) {
    if (MP_SIGNALS_DEMO) {
      if (testMaxCardsSel) testMaxCardsSel.value = '10';
      trimTestFeedToMax();
      updateTestFeedCount();
      return;
    }
    const n = normalizeTestMax(val);
    localStorage.setItem(LS_TEST_MAX_VISIBLE, String(n));
    if (testMaxCardsSel) testMaxCardsSel.value = String(n);
    trimTestFeedToMax();
    updateTestFeedCount();
    fetch('/admin_api/scanner/runtime-settings?max_cards=' + encodeURIComponent(String(n)), { method: 'POST', credentials: 'same-origin' }).catch(() => {});
  };

  window.loadPage = loadPage;

  applyTestMaxToSelect();
  setTestModeUi(source === 'test');

  if (scannerRuntimeSave) {
    scannerRuntimeSave.addEventListener('click', () => { saveScannerRuntime(); });
  }

  wirePurgeButtons();
  applyDemoSignalsRestrictions();

  setInterval(updateAllScannerDurationDisplays, 1000);

  /* ── Scroll-to-top ── */
  window.addEventListener('scroll', () => {
    updateUnreadBtn();
  }, { passive: true });

  window.addEventListener(
    window.MpAdminTime && window.MpAdminTime.EVENT_NAME ? window.MpAdminTime.EVENT_NAME : 'mp-admin-timezone-change',
    function () {
      if (typeof loadPage === 'function') loadPage(page);
    }
  );

  /* ── Старт ── */
  loadPage(1);
})();
</script>
